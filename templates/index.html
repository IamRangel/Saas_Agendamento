<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lash Design - Agendamento Online</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        :root {
            --primary: #00a3ff;
            --bg-main: #05070a;
            --bg-card: #0d121b;
            --border: #1e293b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #00e676;
        }

        /* Isso vai forçar TODOS os textos que usam 'text-muted' a ficarem claros */
.text-muted {
    color: var(--text-muted) !important;
}

/* Garante que os labels de formulários fiquem brancos */
label {
    color: #ffffff !important;
}

/* Melhora a visibilidade dos placeholders (o texto dentro dos inputs antes de digitar) */
::placeholder {
    color: #64748b !important;
    opacity: 1;
}

        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container-app {
            max-width: 450px;
            width: 100%;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--primary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .card-glass {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .form-control {
            background: #161f2e !important;
            border: 1px solid var(--border) !important;
            color: white !important;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            font-weight: 600;
        }

        .form-control:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(0, 163, 255, 0.1);
        }

        /* Calendário Compacto */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-top: 15px;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 12px;
            font-size: 0.85rem;
            background: #161f2e;
            transition: 0.2s;
        }

        .cal-day:hover:not(.empty) { background: var(--border); }
        .cal-day.active { background: var(--primary); font-weight: bold; box-shadow: 0 0 15px rgba(0, 163, 255, 0.3); }
        .cal-day.has-slots::after {
            content: ''; width: 4px; height: 4px; background: var(--primary); border-radius: 50%; position: absolute; margin-top: 25px;
        }

        /* Horários */
        .slot-pill {
            background: #161f2e;
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            flex: 1 1 30%;
        }

        .slot-pill:hover { border-color: var(--primary); color: var(--primary); }
        .slot-pill.selected { background: var(--primary); color: white; border-color: var(--primary); font-weight: bold; }

        .btn-confirm {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-weight: 700;
            width: 100%;
            margin-top: 25px;
            transition: 0.3s;
        }

        .btn-confirm:disabled { background: #2d3748; color: #718096; cursor: not-allowed; }

        .status-box {
            background: rgba(0, 163, 255, 0.1);
            border: 1px solid var(--primary);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="admin-shortcut" style="display: none; position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <a href="/admin-page" class="btn btn-dark shadow-sm">
            <i class="bi bi-gear-fill"></i> Painel Admin
        </a>
    </div>

<div class="container-app">
    <div class="brand-logo">
        <div class="brand-text">LASH DESIGN</div>
        <p class="text-muted small">Agende seu momento de beleza</p>
    </div>

    <div class="card-glass">
        <div id="step-1">
            <label class="text-muted small d-block mb-3 text-center">Informe seu WhatsApp para começar</label>
            <input type="tel" id="user-tel" class="form-control mb-3" placeholder="(00) 00000-0000">
            <button onclick="verificarCliente()" class="btn-confirm">Verificar Horários</button>
        </div>

        <div id="step-2" class="d-none animate__animated animate__fadeIn">
            <div id="status-existente" class="status-box d-none">
                <span class="small d-block">Você já possui um agendamento!</span>
                <strong id="data-agendada" class="text-primary"></strong>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <button class="btn btn-sm text-white" onclick="mudarMes(-1)"><i class="bi bi-chevron-left"></i></button>
                <span id="label-mes" class="fw-bold text-uppercase small" style="color: var(--primary)"></span>
                <button class="btn btn-sm text-white" onclick="mudarMes(1)"><i class="bi bi-chevron-right"></i></button>
            </div>

            <div class="calendar-grid text-muted" style="font-size: 0.7rem; font-weight: 800; text-align: center;">
                <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
            </div>
            <div id="calendar-days" class="calendar-grid"></div>

            <div id="box-slots" class="mt-4 d-none">
                <label class="text-muted small mb-2">Escolha o horário:</label>
                <div id="lista-horarios" class="d-flex flex-wrap gap-2"></div>
                
                <input type="text" id="user-nome" class="form-control mt-4" placeholder="Seu nome completo">
                <button id="btn-finalizar" onclick="confirmarAgendamento()" class="btn-confirm" disabled>Confirmar Agendamento</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuração de URL dinâmica para Local e Deploy
    const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
    ? "http://127.0.0.1:8000"
    : window.location.origin;

    let grade = {};
    let dataCalendario = new Date();
    let horarioSelecionado = null;

    // --- LÓGICA DO BOTÃO ADMIN (O QUE VOCÊ PEDIU) ---
    document.addEventListener("DOMContentLoaded", function() {
        const token = localStorage.getItem('token_phd');
        const adminBtn = document.getElementById('admin-shortcut');
        
        if (token && adminBtn) {
            // Se o navegador tem o token, mostra o atalho para o painel
            adminBtn.style.display = 'block';
        }
    });

    // --- FUNÇÕES DO CHAT DE AGENDAMENTO ---
    async function verificarCliente() {
        const tel = document.getElementById('user-tel').value;
        if(tel.length < 10) return alert("Digite um WhatsApp válido com DDD");

        try {
            // 1. Busca grade de horários disponíveis
            const resG = await fetch(`${API_URL}/agendamentos/horarios`);
            grade = await resG.json();

            // 2. Verifica se o cliente já possui um agendamento ativo
            const resC = await fetch(`${API_URL}/agendamentos/verificar?telefone=${tel}`);
            const status = await resC.json();

            document.getElementById('step-1').classList.add('d-none');
            document.getElementById('step-2').classList.remove('d-none');
            
            if(status.possui_agendamento) {
                const statusBox = document.getElementById('status-existente');
                if (statusBox) {
                    statusBox.classList.remove('d-none');
                    const dt = new Date(status.detalhes.data_hora);
                    document.getElementById('data-agendada').innerText = dt.toLocaleString('pt-BR', {dateStyle:'short', timeStyle:'short'});
                }
            }
            
            renderCalendario();
        } catch (error) {
            console.error("Erro ao conectar com o servidor:", error);
            alert("Erro de conexão. Verifique se o servidor está rodando.");
        }
    }

    function renderCalendario() {
        const grid = document.getElementById('calendar-days');
        const label = document.getElementById('label-mes');
        if (!grid || !label) return;

        grid.innerHTML = '';
        label.innerText = dataCalendario.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });

        const ano = dataCalendario.getFullYear();
        const mes = dataCalendario.getMonth();
        const primDia = new Date(ano, mes, 1).getDay();
        const ultDia = new Date(ano, mes + 1, 0).getDate();

        for (let i = 0; i < primDia; i++) grid.innerHTML += '<div class="cal-day empty"></div>';

        for (let d = 1; d <= ultDia; d++) {
            const dataStr = `${ano}-${String(mes + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const temVaga = grade[dataStr] ? 'has-slots' : '';
            grid.innerHTML += `<div class="cal-day ${temVaga}" onclick="selecionarDia('${dataStr}', this)">${d}</div>`;
        }
    }

    function selecionarDia(data, el) {
        document.querySelectorAll('.cal-day').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
        
        const box = document.getElementById('box-slots');
        const lista = document.getElementById('lista-horarios');
        if (box) box.classList.remove('d-none');
        if (lista) {
            lista.innerHTML = '';
            if(grade[data]) {
                grade[data].forEach(h => {
                    lista.innerHTML += `<div class="slot-pill" onclick="selecionarHorario(${h.id}, this)">${h.hora}</div>`;
                });
            } else {
                lista.innerHTML = '<p class="text-muted small">Nenhum horário disponível nesta data.</p>';
            }
        }
    }

    function selecionarHorario(id, el) {
        document.querySelectorAll('.slot-pill').forEach(p => p.classList.remove('selected'));
        el.classList.add('selected');
        horarioSelecionado = id;
        const btnFinalizar = document.getElementById('btn-finalizar');
        if (btnFinalizar) btnFinalizar.disabled = false;
    }

    async function confirmarAgendamento() {
        const nome = document.getElementById('user-nome').value;
        const tel = document.getElementById('user-tel').value;
        
        if(!nome) return alert("Por favor, digite seu nome");
        if(!horarioSelecionado) return alert("Selecione um horário primeiro");

        try {
            const res = await fetch(`${API_URL}/agendamentos/criar?nome=${nome}&telefone=${tel}&horario_id=${horarioSelecionado}`, {
                method: 'POST'
            });

            if(res.ok) {
                alert("Agendamento realizado com sucesso! Esperamos por você.");
                location.reload();
            } else {
                const errorData = await res.json();
                alert(errorData.erro || "Erro ao agendar. Tente outro horário.");
            }
        } catch (error) {
            alert("Erro na rede ao tentar agendar.");
        }
    }

    function mudarMes(n) { 
        dataCalendario.setMonth(dataCalendario.getMonth() + n); 
        renderCalendario(); 
    }
</script>
</body>
</html>
