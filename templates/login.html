<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lash Design - Restrito</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        :root {
            --primary: #00a3ff;
            --primary-hover: #0077bb;
            --bg-main: #05070a;
            --bg-card: #0d121b;
            --border: #1e293b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --danger: #ff4d4d;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card-glass {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(0, 163, 255, 0.3);
        }

        .brand-text {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--primary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .form-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .form-control {
            background: #161f2e !important;
            border: 1px solid var(--border) !important;
            color: white !important;
            border-radius: 14px;
            padding: 12px 18px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(0, 163, 255, 0.1);
        }

        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            width: 100%;
            font-weight: 700;
            margin-top: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 163, 255, 0.3);
        }

        #error-box {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand-logo">
        <div class="brand-icon">
            <i class="bi bi-shield-lock-fill text-white" style="font-size: 1.8rem;"></i>
        </div>
        <div class="brand-text">ÁREA RESTRITA</div>
    </div>

    <div class="card-glass">
        <div id="error-box"></div>
        
        <form id="login-form">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" id="username" class="form-control" placeholder="Seu usuário" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Entrar no Painel</button>
        </form>
    </div>

    <div class="footer-text">
        &copy; 2024 Lash Design Studio. Todos os direitos reservados.
    </div>
</div>

<script>
    // Identifica automaticamente se está no Render ou Localhost
    const API_URL = window.location.origin;

    const handleLogin = async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorBox = document.getElementById('error-box');
        const btn = document.querySelector('.btn-login');

        // Feedback visual de carregamento
        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Autenticando...';
        btn.disabled = true;

        try {
            const response = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Salva o token JWT para as próximas requisições
                localStorage.setItem('token_phd', data.access_token);
                
                // Redireciona para o painel administrativo
                window.location.href = "admin.html";
            } else {
                errorBox.textContent = data.erro || "Credenciais inválidas";
                errorBox.style.display = 'block';
                btn.innerHTML = 'Entrar no Painel';
                btn.disabled = false;
                
                setTimeout(() => { errorBox.style.display = 'none'; }, 4000);
            }
        } catch (error) {
            console.error("Erro na conexão:", error);
            errorBox.textContent = "Erro ao conectar com o servidor.";
            errorBox.style.display = 'block';
            btn.innerHTML = 'Entrar no Painel';
            btn.disabled = false;
        }
    };

    document.getElementById('login-form').addEventListener('submit', handleLogin);
</script>

</body>
</html>
