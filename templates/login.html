<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lash Design - Login Administrativo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <style>
        :root {
            --primary: #00a3ff;
            --bg-main: #05070a;
            --bg-card: #0d121b;
            --border: #1e293b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        /* Isso vai forçar TODOS os textos que usam 'text-muted' a ficarem claros */
.text-muted {
    color: var(--text-muted) !important;
}

/* Garante que os labels de formulários fiquem brancos */
label {
    color: #ffffff !important;
}

/* Melhora a visibilidade dos placeholders (o texto dentro dos inputs antes de digitar) */
::placeholder {
    color: #64748b !important;
    opacity: 1;
}

        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* Fundo decorativo sutil */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.15;
            top: 10%;
            left: 10%;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 20px;
        }

        .card-glass {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .brand-text {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--primary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            text-align: center;
            margin-bottom: 5px;
        }

        .form-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            margin-left: 5px;
        }

        .form-control {
            background: #161f2e !important;
            border: 1px solid var(--border) !important;
            color: white !important;
            border-radius: 16px;
            padding: 14px 20px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(0, 163, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-weight: 700;
            width: 100%;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 163, 255, 0.2);
        }

        .btn-login:hover {
            background: #0088dd;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 163, 255, 0.4);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .input-group-text {
            background: #161f2e;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 16px 0 0 16px;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        .footer-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-container animate__animated animate__fadeInUp">
    <div class="text-center mb-4">
        <div class="brand-text">LASH DESIGN</div>
        <p class="text-muted small">Painel de Gestão</p>
    </div>

    <div class="card-glass">
        <form id="login-form">
            <div class="mb-4">
                <label class="form-label">Usuário</label>
                <div class="input-group">
                    <input type="text" id="username" class="form-control" placeholder="admin" required>
                </div>
            </div>

            <div class="mb-2">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div id="error-box" class="error-message animate__animated animate__shakeX">
                Usuário ou senha incorretos.
            </div>

            <button type="submit" class="btn-login">
                Entrar no Sistema <i class="bi bi-arrow-right-short"></i>
            </button>
        </form>
    </div>

    <div class="footer-link">
        &copy; 2026 Lash Design System. <br>
        Desenvolvido por <a href="#">Rangel</a>
    </div>
</div>

<script>
    // Configuração de URL dinâmica para Local e Deploy
    const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
    ? "http://127.0.0.1:8000"
    : window.location.origin;

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorBox = document.getElementById('error-box');

        try {
            // Faz a chamada para a API de login
            const response = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Salva o token JWT para as próximas requisições
                // Note: O nome da chave no localStorage deve ser o mesmo que o Admin buscará depois
                localStorage.setItem('token_phd', data.access_token);
                
                // --- AJUSTE CRÍTICO AQUI ---
                // Removemos o ".html" para usar a rota do servidor Flask
                document.querySelector('.login-container').classList.replace('animate__fadeInUp', 'animate__fadeOutDown');
                
                setTimeout(() => {
                    // Redireciona para a rota definida no @app.route('/admin-page') do main.py
                    window.location.href = "/admin-page"; 
                }, 500);

            } else {
                // Exibe erro caso as credenciais estejam erradas
                errorBox.style.display = 'block';
                errorBox.innerText = data.erro || "Usuário ou senha incorretos";
                setTimeout(() => { errorBox.style.display = 'none'; }, 3000);
            }
        } catch (error) {
            console.error("Erro na conexão:", error);
            alert("Não foi possível conectar ao servidor. Verifique se o Flask está rodando.");
        }
    };
</script>
</body>
</html>
